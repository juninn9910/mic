<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>미니 마이크</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --accent: #2dd4bf;
    --live: #ef4444;
    --text: #e7e9ee;
    --muted: #8b91a0;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, system-ui, sans-serif;
    overscroll-behavior: none; touch-action: manipulation;
  }
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 24px 20px calc(24px + env(safe-area-inset-bottom)); gap: 16px;
  }
  h1 { font-size: 20px; font-weight: 600; margin: 4px 0 0; letter-spacing: -0.02em; }
  .status { font-size: 14px; color: var(--muted); min-height: 20px; text-align: center; }
  .status.live { color: var(--live); font-weight: 600; }

  /* 레벨 미터 */
  .meter { width: 100%; max-width: 360px; height: 10px; background: #2a2e38; border-radius: 6px; overflow: hidden; }
  .meter > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), #fbbf24, var(--live)); transition: width 0.06s linear; }

  /* PTT 버튼 */
  .ptt {
    flex: 1; width: 100%; max-width: 360px;
    border: none; border-radius: 28px;
    background: var(--card); color: var(--text);
    font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    user-select: none; -webkit-user-select: none; cursor: pointer;
    transition: background 0.08s, transform 0.08s, box-shadow 0.08s;
    box-shadow: inset 0 0 0 2px #2a2e38;
  }
  .ptt .mic { font-size: 64px; line-height: 1; }
  .ptt .hint { font-size: 14px; font-weight: 500; color: var(--muted); }
  .ptt.live {
    background: var(--live); color: #fff;
    box-shadow: 0 0 0 4px rgba(239,68,68,0.25), 0 0 40px rgba(239,68,68,0.4);
    transform: scale(0.99);
  }
  .ptt.live .hint { color: rgba(255,255,255,0.85); }

  /* 컨트롤 */
  .controls { width: 100%; max-width: 360px; background: var(--card); border-radius: 18px; padding: 16px 18px; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; flex-direction: column; gap: 8px; }
  .row .label { display: flex; justify-content: space-between; font-size: 14px; color: var(--muted); }
  .row .label b { color: var(--text); font-variant-numeric: tabular-nums; }
  input[type=range] { width: 100%; accent-color: var(--accent); height: 28px; }
  .toggle { display: flex; align-items: center; justify-content: space-between; font-size: 14px; }
  .switch { position: relative; width: 50px; height: 30px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: #2a2e38; border-radius: 30px; transition: 0.2s; }
  .slider::before { content: ""; position: absolute; height: 24px; width: 24px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
  .switch input:checked + .slider { background: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(20px); }
  .note { font-size: 12px; color: var(--muted); line-height: 1.5; max-width: 360px; text-align: center; }
</style>
</head>
<body>
  <h1>미니 마이크</h1>
  <div class="status" id="status">버튼을 누르고 말하세요</div>
  <div class="meter"><i id="meterBar"></i></div>

  <button class="ptt" id="ptt">
    <span class="mic">🎙️</span>
    <span id="pttLabel">누르고 말하기</span>
    <span class="hint">누르는 동안만 소리가 나갑니다</span>
  </button>

  <div class="controls">
    <div class="row">
      <div class="label"><span>증폭 배율</span><b id="gainVal">3.0×</b></div>
      <input type="range" id="gain" min="1" max="10" step="0.5" value="3" />
    </div>
    <div class="toggle">
      <span>하울링 억제 (에코 제거)</span>
      <label class="switch"><input type="checkbox" id="echo" checked /><span class="slider"></span></label>
    </div>
  </div>

  <div class="note">마이크 권한을 허용해야 작동합니다. 같은 폰 스피커로 크게 틀면 삐~ 소리(하울링)가 날 수 있어요. 음량을 줄이거나 하울링 억제를 켜세요.</div>

<script>
(function () {
  var ptt = document.getElementById('ptt');
  var statusEl = document.getElementById('status');
  var pttLabel = document.getElementById('pttLabel');
  var gainSlider = document.getElementById('gain');
  var gainVal = document.getElementById('gainVal');
  var echoToggle = document.getElementById('echo');
  var meterBar = document.getElementById('meterBar');

  var ctx = null, source = null, gainNode = null, analyser = null, stream = null;
  var live = false, ready = false, initializing = false;
  var meterData = null, rafId = null;

  function setStatus(text, isLive) {
    statusEl.textContent = text;
    statusEl.classList.toggle('live', !!isLive);
  }

  // 마이크 초기화 (첫 버튼 누름 시 1회)
  async function init() {
    if (ready || initializing) return;
    initializing = true;
    setStatus('마이크 준비 중…');
    try {
      var useEcho = echoToggle.checked;
      stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: useEcho,
          noiseSuppression: false,
          autoGainControl: false
        },
        video: false
      });
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      source = ctx.createMediaStreamSource(stream);
      gainNode = ctx.createGain();
      gainNode.gain.value = parseFloat(gainSlider.value);
      analyser = ctx.createAnalyser();
      analyser.fftSize = 512;
      meterData = new Uint8Array(analyser.fftSize);
      // source -> gain -> analyser (항상 연결). 출력(destination)만 누를 때 연결.
      source.connect(gainNode);
      gainNode.connect(analyser);
      ready = true;
      setStatus('준비 완료 — 누르고 말하세요');
      startMeter();
    } catch (e) {
      setStatus('마이크 접근 실패: ' + (e && e.name ? e.name : '권한 확인 필요'));
    }
    initializing = false;
  }

  function startMeter() {
    function loop() {
      if (analyser && live) {
        analyser.getByteTimeDomainData(meterData);
        var peak = 0;
        for (var i = 0; i < meterData.length; i++) {
          var v = Math.abs(meterData[i] - 128);
          if (v > peak) peak = v;
        }
        meterBar.style.width = Math.min(100, (peak / 128) * 140) + '%';
      } else {
        meterBar.style.width = '0%';
      }
      rafId = requestAnimationFrame(loop);
    }
    if (!rafId) loop();
  }

  async function goLive() {
    if (!ready) { await init(); }
    if (!ready) return;
    if (ctx.state === 'suspended') { try { await ctx.resume(); } catch (e) {} }
    if (!live) {
      gainNode.connect(ctx.destination);
      live = true;
      ptt.classList.add('live');
      pttLabel.textContent = '송출 중…';
      setStatus('🔴 LIVE — 말하세요', true);
    }
  }

  function stopLive() {
    if (live && gainNode) {
      try { gainNode.disconnect(ctx.destination); } catch (e) {}
      live = false;
      ptt.classList.remove('live');
      pttLabel.textContent = '누르고 말하기';
      setStatus('대기 중 — 누르고 말하세요');
      meterBar.style.width = '0%';
    }
  }

  // 포인터 이벤트로 마우스/터치 통합 처리
  ptt.addEventListener('pointerdown', function (e) { e.preventDefault(); goLive(); });
  ptt.addEventListener('pointerup', function (e) { e.preventDefault(); stopLive(); });
  ptt.addEventListener('pointercancel', stopLive);
  ptt.addEventListener('pointerleave', stopLive);
  // 손가락이 버튼 밖으로 나가도 송출 유지되도록 포인터 캡처
  ptt.addEventListener('pointerdown', function (e) {
    try { ptt.setPointerCapture(e.pointerId); } catch (err) {}
  });

  gainSlider.addEventListener('input', function () {
    var v = parseFloat(gainSlider.value);
    gainVal.textContent = v.toFixed(1) + '×';
    if (gainNode) gainNode.gain.value = v;
  });

  // 에코 설정 변경 시 마이크 스트림 재생성 필요 → 안내
  echoToggle.addEventListener('change', function () {
    if (ready) {
      setStatus('적용하려면 페이지를 새로고침 하세요');
    }
  });
})();
</script>
</body>
</html>
