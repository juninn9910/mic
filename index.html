<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>MINI MIC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@1,800;1,900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1f2bff;
    --blue-d: #0a0e5e;
    --yellow: #ffd400;
    --ink: #05060a;
    --paper: #eef1fb;
    --red: #ff2d2d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: var(--ink);
    color: var(--paper);
    font-family: "Space Mono", ui-monospace, monospace;
    overscroll-behavior: none; touch-action: manipulation;
  }
  /* 하프톤 + 대각 스트라이프 배경 */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -2;
    background-image: radial-gradient(circle, rgba(31,43,255,0.55) 1.2px, transparent 1.3px);
    background-size: 9px 9px;
    opacity: 0.7;
  }
  body::after {
    content: ""; position: fixed; inset: 0; z-index: -1;
    background: repeating-linear-gradient(135deg, transparent 0 22px, rgba(31,43,255,0.08) 22px 44px);
  }
  body {
    display: flex; flex-direction: column; align-items: center;
    padding: 18px 16px calc(20px + env(safe-area-inset-bottom));
    gap: 14px; max-width: 480px; margin: 0 auto;
  }

  /* ── 헤더 / 그래피티 타이틀 ── */
  .head { width: 100%; position: relative; }
  .logo-tag {
    display: inline-block; font-family: "Space Mono"; font-weight: 700;
    font-size: 11px; letter-spacing: 2px; color: var(--ink);
    background: var(--yellow); padding: 3px 8px; transform: rotate(-3deg);
  }
  h1 {
    font-family: "Anton", sans-serif; font-weight: 400;
    font-size: 18vw; line-height: 0.82; margin: 6px 0 0;
    letter-spacing: -0.02em; font-style: italic;
    color: var(--yellow);
    -webkit-text-stroke: 2px var(--ink);
    text-shadow: 5px 5px 0 var(--blue), 7px 7px 0 var(--ink);
    text-transform: uppercase;
  }
  @media (min-width: 480px) { h1 { font-size: 86px; } }
  .slogan {
    font-family: "Archivo", sans-serif; font-style: italic; font-weight: 900;
    font-size: 16px; letter-spacing: -0.01em; margin: 8px 0 0;
    color: var(--paper); text-transform: uppercase;
  }
  .slogan .strike { color: #6b6f86; text-decoration: line-through; text-decoration-color: var(--red); text-decoration-thickness: 3px; }
  .slogan .hl { color: var(--yellow); }

  /* 반복 텍스트 데코 */
  .repeat { position: absolute; top: 4px; right: 0; text-align: right; font-size: 12px; line-height: 1.3; color: var(--blue); font-weight: 700; opacity: 0.85; }

  /* ── 라벨 박스 (모노 바운딩박스) ── */
  .label-box {
    position: relative; border: 2px solid var(--blue);
    padding: 10px 12px 12px; margin-top: 2px; width: 100%;
    background: rgba(10,14,94,0.25);
  }
  .label-box > .tag {
    position: absolute; top: -10px; left: 10px;
    background: var(--blue); color: #fff; font-size: 10px; font-weight: 700;
    letter-spacing: 1px; padding: 1px 7px; text-transform: uppercase;
  }
  .label-box.yellow { border-color: var(--yellow); background: rgba(255,212,0,0.06); }
  .label-box.yellow > .tag { background: var(--yellow); color: var(--ink); }

  /* ── 상태 / 미터 ── */
  .status { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: #9aa0bf; }
  .status.live { color: var(--yellow); font-weight: 700; }
  .meter { width: 100%; height: 14px; background: #11142a; border: 2px solid var(--blue); margin-top: 8px; overflow: hidden; }
  .meter > i { display: block; height: 100%; width: 0%; background: repeating-linear-gradient(90deg, var(--yellow) 0 6px, var(--ink) 6px 8px); transition: width 0.06s linear; }

  /* ── PTT 버튼 ── */
  .ptt {
    position: relative; width: 100%; min-height: 200px;
    border: 3px solid var(--ink); border-radius: 0;
    background: var(--blue); color: #fff;
    font-family: "Anton", sans-serif; font-style: italic;
    font-size: 40px; letter-spacing: 0.01em; text-transform: uppercase;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    user-select: none; -webkit-user-select: none; cursor: pointer;
    box-shadow: 8px 8px 0 var(--blue-d);
    transition: background 0.08s, transform 0.06s, box-shadow 0.06s, color 0.08s;
    overflow: hidden;
  }
  .ptt .mic { font-size: 54px; line-height: 1; filter: grayscale(1) contrast(1.4); }
  .ptt .hint { font-family: "Space Mono"; font-style: normal; font-size: 11px; letter-spacing: 1px; color: rgba(255,255,255,0.7); text-transform: uppercase; }
  .ptt.live {
    background: var(--yellow); color: var(--ink);
    box-shadow: 0 0 0 4px var(--red), 14px 14px 0 var(--blue-d), 0 0 60px rgba(255,212,0,0.5);
    transform: translate(2px,2px);
  }
  .ptt.live .hint { color: rgba(5,6,10,0.65); }
  .ptt.live .mic { filter: none; }
  /* 번개 데코 */
  .bolt { position: absolute; bottom: 6px; right: 10px; width: 34px; opacity: 0.85; }
  .ptt.live .bolt path { fill: var(--ink); }

  /* ── 컨트롤 ── */
  .row { display: flex; flex-direction: column; gap: 8px; }
  .row .label { display: flex; justify-content: space-between; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: #9aa0bf; }
  .row .label b { color: var(--yellow); font-weight: 700; font-size: 15px; }
  input[type=range] { width: 100%; accent-color: var(--yellow); height: 30px; }
  .toggle { display: flex; align-items: center; justify-content: space-between; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: #cfd3ea; }
  .switch { position: relative; width: 54px; height: 30px; flex: none; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: #20243f; border: 2px solid var(--blue); transition: 0.2s; }
  .slider::before { content: ""; position: absolute; height: 20px; width: 20px; left: 3px; top: 3px; background: #fff; transition: 0.2s; }
  .switch input:checked + .slider { background: var(--yellow); border-color: var(--yellow); }
  .switch input:checked + .slider::before { transform: translateX(24px); background: var(--ink); }

  .footer { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-top: 2px; }
  .vertag { font-size: 10px; color: var(--blue); font-weight: 700; letter-spacing: 1px; }
  .note { font-size: 10.5px; line-height: 1.5; color: #8a90ad; letter-spacing: 0.3px; }
  .note b { color: var(--yellow); }
</style>
</head>
<body>

  <div class="head">
    <span class="logo-tag">THE 1ST APP · MINI MIC</span>
    <div class="repeat">mic mic mic<br>talk talk talk</div>
    <h1>Mini<br>Mic</h1>
    <p class="slogan">HOLD TO <span class="strike">WHISPER</span> <span class="hl">SHOUT.</span></p>
  </div>

  <div class="label-box">
    <span class="tag">INPUT</span>
    <div class="status" id="status">버튼을 누르고 말하세요</div>
    <div class="meter"><i id="meterBar"></i></div>
  </div>

  <button class="ptt" id="ptt">
    <span class="mic">🎙</span>
    <span id="pttLabel">PUSH TO TALK</span>
    <span class="hint">누르는 동안만 송출 / hold to speak</span>
    <svg class="bolt" viewBox="0 0 24 24" aria-hidden="true"><path fill="#ffd400" d="M13 2 4 14h6l-2 8 10-13h-7z"/></svg>
  </button>

  <div class="label-box yellow">
    <span class="tag">GAIN</span>
    <div class="row">
      <div class="label"><span>증폭 배율 / amplify</span><b id="gainVal">3.0×</b></div>
      <input type="range" id="gain" min="1" max="10" step="0.5" value="3" />
    </div>
  </div>

  <div class="label-box">
    <span class="tag">ANTI-HOWL</span>
    <div class="toggle">
      <span>하울링 억제 (echo cancel)</span>
      <label class="switch"><input type="checkbox" id="echo" checked /><span class="slider"></span></label>
    </div>
  </div>

  <div class="footer">
    <span class="vertag">v1.0 — 24.06.2026</span>
    <span class="vertag">★ AUDIO / LIVE</span>
  </div>

  <div class="note">마이크 권한을 <b>허용</b>해야 작동합니다. 같은 폰 스피커로 크게 틀면 <b>하울링(삐~)</b>이 날 수 있어요 — 배율을 낮추거나 ANTI-HOWL을 켜세요(변경 후 새로고침).</div>

<script>
(function () {
  var ptt = document.getElementById('ptt');
  var statusEl = document.getElementById('status');
  var pttLabel = document.getElementById('pttLabel');
  var gainSlider = document.getElementById('gain');
  var gainVal = document.getElementById('gainVal');
  var echoToggle = document.getElementById('echo');
  var meterBar = document.getElementById('meterBar');

  var ctx = null, source = null, gainNode = null, analyser = null, stream = null;
  var live = false, ready = false, initializing = false;
  var meterData = null, rafId = null;

  function setStatus(text, isLive) {
    statusEl.textContent = text;
    statusEl.classList.toggle('live', !!isLive);
  }

  async function init() {
    if (ready || initializing) return;
    initializing = true;
    setStatus('마이크 준비 중…');
    try {
      var useEcho = echoToggle.checked;
      stream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: useEcho, noiseSuppression: false, autoGainControl: false },
        video: false
      });
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      source = ctx.createMediaStreamSource(stream);
      gainNode = ctx.createGain();
      gainNode.gain.value = parseFloat(gainSlider.value);
      analyser = ctx.createAnalyser();
      analyser.fftSize = 512;
      meterData = new Uint8Array(analyser.fftSize);
      source.connect(gainNode);
      gainNode.connect(analyser);
      ready = true;
      setStatus('준비 완료 — 누르고 말하세요');
      startMeter();
    } catch (e) {
      setStatus('마이크 실패: ' + (e && e.name ? e.name : '권한 확인'));
    }
    initializing = false;
  }

  function startMeter() {
    function loop() {
      if (analyser && live) {
        analyser.getByteTimeDomainData(meterData);
        var peak = 0;
        for (var i = 0; i < meterData.length; i++) {
          var v = Math.abs(meterData[i] - 128);
          if (v > peak) peak = v;
        }
        meterBar.style.width = Math.min(100, (peak / 128) * 140) + '%';
      } else {
        meterBar.style.width = '0%';
      }
      rafId = requestAnimationFrame(loop);
    }
    if (!rafId) loop();
  }

  async function goLive() {
    if (!ready) { await init(); }
    if (!ready) return;
    if (ctx.state === 'suspended') { try { await ctx.resume(); } catch (e) {} }
    if (!live) {
      gainNode.connect(ctx.destination);
      live = true;
      ptt.classList.add('live');
      pttLabel.textContent = 'ON AIR';
      setStatus('● LIVE — 말하세요', true);
    }
  }

  function stopLive() {
    if (live && gainNode) {
      try { gainNode.disconnect(ctx.destination); } catch (e) {}
      live = false;
      ptt.classList.remove('live');
      pttLabel.textContent = 'PUSH TO TALK';
      setStatus('대기 중 — 누르고 말하세요');
      meterBar.style.width = '0%';
    }
  }

  ptt.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    try { ptt.setPointerCapture(e.pointerId); } catch (err) {}
    goLive();
  });
  ptt.addEventListener('pointerup', function (e) { e.preventDefault(); stopLive(); });
  ptt.addEventListener('pointercancel', stopLive);

  gainSlider.addEventListener('input', function () {
    var v = parseFloat(gainSlider.value);
    gainVal.textContent = v.toFixed(1) + '×';
    if (gainNode) gainNode.gain.value = v;
  });

  echoToggle.addEventListener('change', function () {
    if (ready) setStatus('적용하려면 새로고침 하세요');
  });
})();
</script>
</body>
</html>
